<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ABQ Mission Clock</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
overflow:hidden;
}

#city{
color:#4da6ff;
font-size:50px;
margin-top:15px;
}

#temp{
font-size:70px;
margin-bottom:10px;
}

#clock{
font-size:170px;
color:#39ff14;
}

#date{
font-size:34px;
margin-bottom:20px;
}

#forecast{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
}

.day{
display:inline-block;
width:110px;
}

.dayname{
font-size:22px;
margin-bottom:5px;
}

.high{
color:#ff4444;
font-size:26px;
}

.low{
color:#66aaff;
font-size:22px;
}

</style>
</head>

<body>

<div id="city">Albuquerque</div>
<div id="temp">--°F</div>

<div id="clock">--:--</div>
<div id="date"></div>

<div id="forecast"></div>

<script>

/* CLOCK */

function updateClock(){

var now=new Date();

var h=now.getHours();
var m=now.getMinutes();

var ampm="AM";

if(h>=12){ampm="PM";}
if(h>12){h=h-12;}
if(h==0){h=12;}

if(m<10){m="0"+m;}

document.getElementById("clock").innerHTML=h+":"+m+" "+ampm;
document.getElementById("date").innerHTML=now.toDateString();

}

setInterval(updateClock,1000);
updateClock();


/* WEATHER */

var xhr=new XMLHttpRequest();

xhr.open(
"GET",
"https://api.open-meteo.com/v1/forecast?latitude=35.0844&longitude=-106.6504&current_weather=true&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=auto",
true
);

xhr.onload=function(){

var data=JSON.parse(xhr.responseText);

/* CURRENT TEMP */

document.getElementById("temp").innerHTML=
Math.round(data.current_weather.temperature)+"°F";


/* FORECAST */

var days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

var out="";

for(var i=0;i<5;i++){

var d=new Date(data.daily.time[i]);
var day=days[d.getDay()];

out+="<div class='day'>";

out+="<div class='dayname'>"+day+"</div>";

out+="<div class='high'>"+
Math.round(data.daily.temperature_2m_max[i])+"°</div>";

out+="<div class='low'>"+
Math.round(data.daily.temperature_2m_min[i])+"°</div>";

out+="</div>";

}

document.getElementById("forecast").innerHTML=out;

};

xhr.send();

</script>

</body>
</html>
